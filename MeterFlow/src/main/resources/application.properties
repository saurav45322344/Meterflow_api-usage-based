spring.datasource.password=@Niraj7488583932

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect
spring.jpa.hibernate.ddl-auto=update

spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true


spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.timeout=60000


spring.kafka.bootstrap-servers=localhost:9092

# Producer
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.apache.kafka.common.serialization.StringSerializer

# Consumer
spring.kafka.consumer.group-id=usage-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer


logging.level.org.springframework=INFO
logging.level.com.Usage_Based_API=DEBUG

# ===============================
# \uD83D\uDD10 JWT (Optional - if using)
# ===============================
jwt.secret=my-super-secret-key-that-is-at-least-32-characters-long-12345
jwt.expiration=3600000

# ===============================
# \uD83C\uDF0D CORS (for frontend)
# ===============================
spring.web.cors.allowed-origins=http://localhost:3000
spring.web.cors.allowed-methods=GET,POST,PUT,DELETE
spring.web.cors.allowed-headers=*

# ===============================
# \u2699\uFE0F ACTUATOR (Monitoring)
# ===============================
management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=always


